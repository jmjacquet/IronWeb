services:
  ironweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ironweb
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      DEBUG: ${DEBUG:-False}
      GUNICORN_WSGI: ${GUNICORN_WSGI:-ggcontable.wsgi:application}
      DB_HOST: ${DB_HOST:-mariadb_ironweb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SECRET_KEY: ${SECRET_KEY}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-ironweb_session}
      SERVER_EMAIL: ${SERVER_EMAIL}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-6}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      GUNICORN_BIND: ${GUNICORN_BIND:-0.0.0.0:8000}
      COLLECT_STATIC: ${COLLECT_STATIC:-false}
      AFIP_SERVICE_URL: ${AFIP_SERVICE_URL:-http://afip-service:8002}
    volumes:
      - ironweb_static:/app/static
      - ironweb_media:/app/media
      - ironweb_logs:/app/logs
    networks:
      - dokploy-network
    depends_on:
      - afip-service
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.enable=true
      - traefik.http.services.ironweb.loadbalancer.server.port=8000
      # Main app: *.ironwebgestion.com.ar (all paths except /static, /media)
      - traefik.http.routers.ironweb.rule=HostRegexp(`{host:([a-z0-9-]+\\.)*ironwebgestion\\.com\\.ar}`)
      - traefik.http.routers.ironweb.entrypoints=websecure
      - traefik.http.routers.ironweb.tls=true
      - traefik.http.routers.ironweb.tls.certresolver=letsencrypt
      - traefik.http.routers.ironweb.service=ironweb
      - traefik.http.routers.ironweb.priority=1
      # HTTP → redirect to HTTPS
      - traefik.http.middlewares.ironweb-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.ironweb-redirect.redirectscheme.permanent=true
      - traefik.http.routers.ironweb-http.rule=HostRegexp(`{host:([a-z0-9-]+\\.)*ironwebgestion\\.com\\.ar}`)
      - traefik.http.routers.ironweb-http.entrypoints=web
      - traefik.http.routers.ironweb-http.middlewares=ironweb-redirect
      - traefik.http.routers.ironweb-http.service=ironweb
      - traefik.http.routers.ironweb-http.priority=1

  afip-service:
    build:
      context: ./felectronica_service
      dockerfile: Dockerfile
    container_name: afip_service
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      DEBUG: ${AFIP_DEBUG:-false}
      AFIP_HOMOLOGACION: ${AFIP_HOMOLOGACION:-true}
    ports:
      - "8002:8002"
    volumes:
      - ./felectronica_service/certificados:/app/certificados
      - afip_logs:/app/logs
    networks:
      - dokploy-network

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mariadb-shared-2xk6mf
      ADMINER_DEFAULT_DB: jmjacquet
      ADMINER_DEFAULT_USERNAME: jmjacquet
      ADMINER_DEFAULT_PASSWD: piranha
    networks:
      - dokploy-network
      - shared-services-adminer-w8vuue
    labels:
      - traefik.http.routers.adminer.rule=Host(`adminer.ironwebgestion.com.ar`)
      - traefik.http.routers.adminer.entrypoints=websecure
      - traefik.http.routers.adminer.tls=true
      - traefik.http.routers.adminer.tls.certresolver=letsencrypt
      - traefik.http.services.adminer.loadbalancer.server.port=8080
      - traefik.enable=true

networks:
  dokploy-network:
    external: true
  shared-services-adminer-w8vuue:
    name: shared-services-adminer-w8vuue
    external: true